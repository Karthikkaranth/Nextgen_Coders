<!DOCTYPE html>
<html>
<head>
    <title>Modern Chat UI</title>

    <style>
        body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    /* Dark UI / Purple Twilight Background */
    background:
        radial-gradient(circle at 20% 30%, rgba(120, 60, 200, 0.25), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(80, 0, 150, 0.35), transparent 40%),
        linear-gradient(180deg, #0b0615 0%, #120824 40%, #1a0f35 70%, #0a0715 100%);
}

        /* Main White Panel */
        .panel {
            width: 900px;
            height: 550px;
            background: #ffffff;
            border-radius: 20px;
            display: flex;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* Left Section (branding / visual) */
        .left {
            width: 35%;
            background: #f7f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #e0e6ed;
        }

        /* Right Section (chat area) */
        .right {
            width: 65%;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* Chat container */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }
.bubble {
    max-width: 70%;
    padding: 12px 16px;
    margin: 6px 0;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.4;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

        .user {
            background: #f1f3f5;
            align-self: flex-start;
        }
        select {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #d6d9e0;
    background: white;
    cursor: pointer;
    transition: all 0.2s ease;
}

select:hover {
    border-color: #7b2ff7;
}

        .system {
            background: #4CAF50;
            color: white;
            align-self: flex-end;
            text-align: right;
        }

        .date-label {
            display: block;
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
        }

        /* Input area */
        .input-area {
            display: flex;
            margin-top: 10px;
            gap: 10px;
        }

       input {
    flex: 1;
    padding: 11px 12px;
    border-radius: 10px;
    border: 1px solid #d6d9e0;
    outline: none;
    font-size: 14px;
    transition: all 0.25s ease;
}

input:focus {
    border-color: #7b2ff7;
    box-shadow: 0 0 0 2px rgba(123,47,247,0.2);
}

        /* Green CTA Button */
       button {
    background: linear-gradient(135deg, #7b2ff7, #f107a3);
    border: none;
    padding: 11px 20px;
    border-radius: 10px;
    color: white;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 8px 18px rgba(123,47,247,0.35);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(123,47,247,0.55);
}

button:active {
    transform: scale(0.96);
}

        button:hover {
            background: #27ae60;
        }

        /* Grey helper text */
        .helper {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<div class="panel">

    <!-- LEFT SIDE -->
    <div class="left">
        <div class="circle"></div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <div id="chat-container"></div>

        <div class="input-area">
            <select id="language">
                <option value="as">Assamese</option>
                <option value="bn">Bengali</option>
                <option value="brx">Bodo</option>
                <option value="doi">Dogri</option>
                <option value="gu">Gujarati</option>
                <option value="hi">Hindi</option>
                <option value="kn">Kannada</option>
                <option value="ks">Kashmiri</option>
                <option value="kok">Konkani</option>
                <option value="mai">Maithili</option>
                <option value="ml">Malayalam</option>
                <option value="mni">Manipuri</option>
                <option value="mr">Marathi</option>
                <option value="ne">Nepali</option>
                <option value="or">Odia</option>
                <option value="pa">Punjabi</option>
                <option value="sa">Sanskrit</option>
                <option value="sat">Santali</option>
                <option value="sd">Sindhi</option>
                <option value="ta">Tamil</option>
                <option value="te">Telugu</option>
                <option value="ur">Urdu</option>
                </select>
            <input type="text" id="userInput" placeholder="Type here...">
            <button onclick="sendMessage()">Send</button>
        </div>

        <div class="helper">Your messages are securely processed</div>

    </div>
</div>

<script>
    const container = document.getElementById('chat-container');

    function addBubble(text, sender, date = "") {
        const div = document.createElement('div');
        div.className = `bubble ${sender}`;
        div.innerHTML = `<pre>${text}</pre>`;
        if(date) {
            div.innerHTML += `<span class="date-label">${date}</span>`;
        }
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    window.onload = async () => {
        const res = await fetch('/history');
        const history = await res.json();
        history.forEach(m => addBubble(m.text, m.sender, m.date_str));
    };

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const lang = document.getElementById('language');
        const val = input.value;
        if(!val) return;

        addBubble(val, 'user');
        input.value = '';

        const res = await fetch('/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text: val,lan:lang})
        });

        const data = await res.json();
        addBubble(data.reply, 'system', data.date);
    }
</script>

</body>
</html>
