<!DOCTYPE html>
<html>
<head>
    <title>Modern Chat UI</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a1f44, #6a11cb);
        }

        .panel {
            width: 900px;
            height: 550px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* 🔥 HEADER (FIXED POSITION) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .title {
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ff4b5c, #ff1e3c);
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: 0.3s;
        }

        .logout-btn:hover {
            transform: scale(1.05);
        }

        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .bubble {
            max-width: 70%;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .user {
            background: rgba(255,255,255,0.15);
            color: #fff;
            align-self: flex-start;
        }

        .system {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            align-self: flex-end;
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
        }

        select {
            border-radius: 10px;
            padding: 10px;
            background: rgba(255,255,255,0.15);
            color: white;
            max-height: 200px;
        }

        /* 🔥 FIX dropdown full list */
        select option {
            color: black;
            background: white;
        }

        button {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        /* 🔥 POPUP */
        .logout-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .popup-box {
            background: #1c1c2b;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            color: white;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

<body>

<div class="panel">

    <!-- ✅ HEADER FIX -->
    <div class="header">
        <div class="title">💬 Chat App</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="right">
        <div id="chat-container"></div>

        <div class="input-area">
            <select id="language">
                <option value="as">Assamese</option>
                <option value="bn">Bengali</option>
                <option value="brx">Bodo</option>
                <option value="doi">Dogri</option>
                <option value="gu">Gujarati</option>
                <option value="hi">Hindi</option>
                <option value="kn">Kannada</option>
                <option value="ks">Kashmiri</option>
                <option value="kok">Konkani</option>
                <option value="mai">Maithili</option>
                <option value="ml">Malayalam</option>
                <option value="mni">Manipuri</option>
                <option value="mr">Marathi</option>
                <option value="ne">Nepali</option>
                <option value="or">Odia</option>
                <option value="pa">Punjabi</option>
                <option value="sa">Sanskrit</option>
                <option value="sat">Santali</option>
                <option value="sd">Sindhi</option>
                <option value="ta">Tamil</option>
                <option value="te">Telugu</option>
                <option value="ur">Urdu</option>
            </select>

            <input type="text" id="userInput" placeholder="Type your message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<div class="logout-popup" id="popup">
    <div class="popup-box">
        <h2>👋 Logged Out</h2>
        <p>Redirecting...</p>
    </div>
</div>

<script>
const container = document.getElementById('chat-container');

function addBubble(text, sender) {
    const div = document.createElement('div');
    div.className = `bubble ${sender}`;
    div.innerText = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

window.onload = () => {
    addBubble("Hello User 👋", "system");
};

async function sendMessage() {
    const input = document.getElementById('userInput');
    const val = input.value;
    if(!val) return;

    addBubble(val, 'user');
    input.value = '';

    const res = await fetch('/send', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text: val})
    });

    const data = await res.json();
    addBubble(data.reply, 'system');
}

function logout() {
    document.getElementById('popup').style.display = 'flex';
    fetch('/logout');

    setTimeout(() => {
        window.location.href = "/";
    }, 2000);
}
</script>

</body>
</html>
