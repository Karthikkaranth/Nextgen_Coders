<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: #0f0f1a;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Container */
.container {
    width: 400px;
    background: #1c1c2b;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    color: #fff;
    text-align: center;
}

h2 {
    margin-bottom: 10px;
    font-size: 26px;
}

p {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 25px;
}

/* OTP Input */
.input-box {
    margin-bottom: 15px;
}

.input-box input {
    width: 100%;
    padding: 14px;
    text-align: center;
    font-size: 18px;
    letter-spacing: 5px;
    background: transparent;
    border: 1px solid #444;
    border-radius: 8px;
    color: #fff;
    outline: none;
}

.input-box input:focus {
    border-color: #7a3cff;
}

/* Button */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #7a3cff, #5f2bff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    opacity: 0.9;
}

/* Error */
.error {
    color: #ff4d4d;
    font-size: 13px;
    margin-top: 10px;
}

/* Success */
.success {
    color: #4dff88;
    font-size: 14px;
    margin-top: 10px;
}

/* Resend */
.resend {
    margin-top: 15px;
    font-size: 13px;
}

.resend span {
    color: #7a3cff;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <h2>Verify OTP</h2>
    <p>Enter the OTP sent to your email</p>

    <div class="input-box">
        <input type="text" id="otp" placeholder="••••••" maxlength="6">
    </div>

    <button class="btn" onclick="verifyOTP()">Verify OTP</button>

    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>

    <div class="resend">
        Didn’t receive OTP? <span onclick="resendOTP()">Resend</span>
    </div>

</div>

<script>

const urlParams = new URLSearchParams(window.location.search);
const email = urlParams.get("email");

// ✅ Verify OTP
async function verifyOTP() {

    let otp = document.getElementById("otp").value;
    let errorMsg = document.getElementById("errorMsg");
    let successMsg = document.getElementById("successMsg");

    errorMsg.innerText = "";
    successMsg.innerText = "";

    if (otp.length !== 6) {
        errorMsg.innerText = "Enter valid 6-digit OTP";
        return;
    }

    try {
        let res = await fetch("http://127.0.0.1:5000/verify-otp", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({email, otp})
        });

        let data = await res.json();

        if (data.status === "success") {
            successMsg.innerText = "Account Verified Successfully ✅";
            
            setTimeout(() => {
                alert("Welcome 🎉");
                window.location.href = "index.html"; // redirect after success
            }, 1500);

        } else {
            errorMsg.innerText = "Invalid OTP ❌";
        }

    } catch (err) {
        errorMsg.innerText = "Server error 😢";
    }
}

// 🔁 Resend OTP
async function resendOTP() {

    let successMsg = document.getElementById("successMsg");
    let errorMsg = document.getElementById("errorMsg");

    successMsg.innerText = "";
    errorMsg.innerText = "";

    try {
        let res = await fetch("http://127.0.0.1:5000/resend-otp", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({email})
        });

        let data = await res.json();

        if (data.status === "success") {
            successMsg.innerText = "OTP resent successfully 📧";
        } else {
            errorMsg.innerText = "Failed to resend OTP";
        }

    } catch (err) {
        errorMsg.innerText = "Server error 😢";
    }
}

</script>

</body>
</html>
