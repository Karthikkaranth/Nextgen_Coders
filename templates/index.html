<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f0f1a, #1a1a40);
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 420px;
    background: #1c1c2b;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    color: #fff;
    text-align: center;
}

h2 {
    margin-bottom: 25px;
}

.input-box {
    margin-bottom: 18px;
}

.input-box input {
    width: 100%;
    padding: 14px;
    background: #1c1c2b;
    border: 1px solid #444;
    border-radius: 8px;
    color: #fff;
    outline: none;
}

.input-box input:focus {
    border-color: #7a3cff;
}

/* 🔥 ERROR BOX */
.error-box {
    display: none;
    background: rgba(255, 77, 77, 0.1);
    color: #ff4d4d;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
    font-size: 14px;
    text-align: left;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(-5px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Button */
.btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #7a3cff, #5f2bff);
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.03);
}

/* Password */
.password-box {
    position: relative;
}

.password-box input {
    padding-right: 45px;
}

.eye {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    width: 20px;
    height: 20px;
    opacity: 0.7;
}

.eye:hover {
    opacity: 1;
}

/* Register */
.register-text {
    margin-top: 15px;
    font-size: 14px;
    color: #aaa;
}

.register-text button {
    background: none;
    border: none;
    color: #7a3cff;
    font-weight: bold;
    cursor: pointer;
}

/* Success */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle, #1a1a40, #0f0f1a);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.overlay.active {
    display: flex;
}

.success-text {
    font-size: 36px;
    color: #00ffae;
}

.loader {
    width: 60px;
    height: 60px;
    border: 6px solid #333;
    border-top: 6px solid #00ffae;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
    <h2>Welcome 👋</h2>

    <!-- 🔥 ERROR BOX -->
    <div id="errorBox" class="error-box"></div>

    <div class="input-box">
        <input type="text" id="loginUsername" placeholder="Enter your username">
    </div>

    <div class="input-box password-box">
        <input type="password" id="loginPassword" placeholder="Enter your password">

        <svg class="eye" onclick="togglePassword()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white">
            <path stroke-width="2" d="M15 12a3 3 0 11-6 0"/>
            <path stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7"/>
        </svg>
    </div>

    <button class="btn" onclick="loginUser()">Login</button>

    <p class="register-text">
        Don’t have an account?
        <button onclick="goToRegister()">Create one</button>
    </p>
</div>

<div class="overlay" id="overlay">
    <div class="success-text">Login Successful</div>
    <div class="loader"></div>
</div>

<script>

function togglePassword() {
    let password = document.getElementById("loginPassword");
    password.type = password.type === "password" ? "text" : "password";
}

function goToRegister() {
    window.location.href = "/account";
}

function showError(msg) {
    let box = document.getElementById("errorBox");
    box.innerText = msg;
    box.style.display = "block";
}

function hideError() {
    document.getElementById("errorBox").style.display = "none";
}

async function loginUser() {
    let username = document.getElementById("loginUsername").value.trim();
    let password = document.getElementById("loginPassword").value.trim();

    if (!username || !password) {
        showError("⚠️ Please fill all fields");
        return;
    }

    try {
        let res = await fetch("/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username, password})
        });

        let data = await res.json();

        if (data.status === "success") {
            hideError();
            document.getElementById("overlay").classList.add("active");

            setTimeout(() => {
                window.location.href = "/chat";
            }, 2000);
        } else {
            showError("❌ Invalid username or password");
        }

    } catch {
        showError("⚠️ Server error. Try again.");
    }
}
</script>

</body>
</html>
