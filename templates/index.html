<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f0f1a, #1a1a40);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* LOGIN BOX */
.container {
    width: 420px;
    background: #1c1c2b;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    color: #fff;
    text-align: center;
}

h2 {
    margin-bottom: 25px;
}

.input-box {
    margin-bottom: 18px;
}

/* INPUT FIX */
.input-box input {
    width: 100%;
    padding: 14px;
    background: #1c1c2b;
    border: 1px solid #444;
    border-radius: 8px;
    color: #fff;
    outline: none;
}

.input-box input:focus {
    border-color: #7a3cff;
}

/* AUTOFILL FIX */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0px 1000px #1c1c2b inset !important;
    -webkit-text-fill-color: #fff !important;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #7a3cff, #5f2bff);
    color: white;
    cursor: pointer;
}

/* PASSWORD BOX */
.password-box {
    position: relative;
}

.password-box input {
    padding-right: 45px;
}

/* 🔥 SIMPLE EYE ICON */
.eye {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    width: 20px;
    height: 20px;
    opacity: 0.7;
}

.eye:hover {
    opacity: 1;
}

/* SUCCESS OVERLAY */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle, #1a1a40, #0f0f1a);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
}

.overlay.active {
    display: flex;
}

.success-text {
    font-size: 36px;
    font-weight: bold;
    color: #00ffae;
    margin-bottom: 25px;
}

.loader {
    width: 60px;
    height: 60px;
    border: 6px solid #333;
    border-top: 6px solid #00ffae;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
    <h2>Welcome 👋</h2>

    <div class="input-box">
        <input type="text" id="loginUsername" placeholder="Enter your username">
    </div>

    <div class="input-box password-box">
        <input type="password" id="loginPassword" placeholder="Enter your password">

        <!-- 👁️ SIMPLE SVG ICON -->
        <svg class="eye" onclick="togglePassword()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
    </div>

    <button class="btn" onclick="loginUser()">Login</button>
</div>

<!-- SUCCESS -->
<div class="overlay" id="overlay">
    <div class="success-text">Login Successful</div>
    <div class="loader"></div>
</div>

<script>

function togglePassword() {
    let password = document.getElementById("loginPassword");

    if (password.type === "password") {
        password.type = "text";
    } else {
        password.type = "password";
    }
}

async function loginUser() {

    let username = document.getElementById("loginUsername").value;
    let password = document.getElementById("loginPassword").value;

    if (!username || !password) {
        alert("Fill all fields");
        return;
    }

    let res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username, password})
    });

    let data = await res.json();

    if (data.status === "success") {
        document.getElementById("overlay").classList.add("active");

        setTimeout(() => {
            window.location.href = "/chat";
        }, 3000);
    } else {
        alert("Invalid credentials");
    }
}
</script>

</body>
</html>
