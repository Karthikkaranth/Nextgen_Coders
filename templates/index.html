<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: #0f0f1a;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Full Card */
.container {
    width: 450px;
    background: #1c1c2b;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    color: #fff;
}

h2 {
    margin-bottom: 25px;
    font-size: 26px;
    text-align: center;
}

/* Input Fields */
.input-box {
    margin-bottom: 15px;
}

.input-box input {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid #444;
    border-radius: 8px;
    color: #fff;
    outline: none;
}

.input-box input:focus {
    border-color: #7a3cff;
}

/* Error Message */
.error {
    color: #ff4d4d;
    font-size: 13px;
    margin-top: 5px;
}

/* Password toggle */
.password-box {
    position: relative;
}

.password-box span {
    position: absolute;
    right: 12px;
    top: 12px;
    cursor: pointer;
    color: #aaa;
}

/* Checkbox */
.checkbox {
    display: flex;
    align-items: center;
    font-size: 14px;
    margin-top: 10px;
    margin-bottom: 20px;
}

.checkbox input {
    margin-right: 8px;
}

/* Button */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #7a3cff, #5f2bff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    opacity: 0.9;
}

/* Login link */
.login {
    margin-top: 20px;
    text-align: center;
    font-size: 14px;
}

.login a {
    color: #7a3cff;
    text-decoration: none;
}

/* Highlight error input */
.input-error {
    border-color: #ff4d4d !important;
}
</style>
</head>

<body>

<div class="container">

    <h2>Create an Account</h2>

    <div class="input-box">
        <input type="text" id="username" placeholder="Username">
        <div class="error" id="userError"></div>
    </div>

    <div class="input-box">
        <input type="email" id="email" placeholder="Email">
        <div class="error" id="emailError"></div>
    </div>

    <div class="input-box password-box">
        <input type="password" id="password" placeholder="Password">
        <span onclick="togglePassword()">👁</span>
        <div class="error" id="passError"></div>
    </div>

    <div class="checkbox">
        <input type="checkbox" id="terms">
        <label>I agree to Terms & Conditions</label>
    </div>
    <div class="error" id="termsError"></div>

    <button class="btn" onclick="validateForm()">Create Account</button>

    <div class="login">
        Already have an account? <a href="#">Login</a>
    </div>

</div>

<script>
function togglePassword() {
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

function validateForm() {
    let username = document.getElementById("username");
    let email = document.getElementById("email");
    let password = document.getElementById("password");
    let terms = document.getElementById("terms");

    let isValid = true;

    // Clear previous errors
    document.querySelectorAll(".error").forEach(e => e.innerText = "");
    document.querySelectorAll("input").forEach(i => i.classList.remove("input-error"));

    // Username validation
    if (username.value.trim() === "") {
        setError(username, "Username is required", "userError");
        isValid = false;
    } else if (username.value.includes(" ")) {
        setError(username, "Username should not contain spaces", "userError");
        isValid = false;
    }

    // Email validation
    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (email.value.trim() === "") {
        setError(email, "Email is required", "emailError");
        isValid = false;
    } else if (!email.value.match(emailPattern)) {
        setError(email, "Enter a valid email", "emailError");
        isValid = false;
    }

    // Password validation
    if (password.value.trim() === "") {
        setError(password, "Password is required", "passError");
        isValid = false;
    } else if (password.value.length < 6) {
        setError(password, "Password must be at least 6 characters", "passError");
        isValid = false;
    }

    // Terms validation
    if (!terms.checked) {
        document.getElementById("termsError").innerText = "You must accept Terms & Conditions";
        isValid = false;
    }

    if (isValid) {
        alert("Account Created Successfully 🚀");
    }
}

function setError(input, message, errorId) {
    input.classList.add("input-error");
    document.getElementById(errorId).innerText = message;
}
</script>

</body>
</html>
