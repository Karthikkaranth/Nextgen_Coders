<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f0f1a, #1a1a40);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Container (BIGGER 🔥) */
.container {
    width: 520px;
    background: #1c1c2b;
    padding: 50px;
    border-radius: 25px;
    color: #fff;
    position: relative;
    box-shadow: 0 25px 70px rgba(0,0,0,0.7);
    text-align: center;
    animation: fadeIn 0.6s ease;
}

/* Smooth entry */
@keyframes fadeIn {
    from {
        transform: translateY(30px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

/* 🔥 MODERN BACK BUTTON */
.back-btn {
    position: absolute;
    top: 15px;
    left: 20px;
    padding: 6px 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(5px);
    cursor: pointer;
    color: #aaa;
    font-size: 14px;
    transition: 0.3s;
}

.back-btn:hover {
    background: #7a3cff;
    color: white;
    transform: translateX(-3px);
}

/* Heading */
h2 {
    margin-bottom: 30px;
    font-size: 28px;
}

/* Inputs */
.input-box {
    margin-bottom: 18px;
}

input {
    width: 100%;
    padding: 15px;
    background: #1c1c2b;
    border: 1px solid #444;
    border-radius: 10px;
    color: #fff;
    outline: none;
    font-size: 15px;
}

input:focus {
    border-color: #7a3cff;
}

/* Error */
.error {
    font-size: 12px;
    color: #ff4d4d;
    text-align: left;
    margin-top: 5px;
}

/* Button */
button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #7a3cff, #5f2bff);
    color: white;
    cursor: pointer;
    font-weight: bold;
    font-size: 15px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Popup */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    visibility: hidden;
    opacity: 0;
    transition: 0.3s;
}

.popup.show {
    visibility: visible;
    opacity: 1;
}

.popup-box {
    background: #1c1c2b;
    padding: 35px 50px;
    border-radius: 20px;
    text-align: center;
    color: #fff;
    box-shadow: 0 0 30px rgba(122,60,255,0.6);
    animation: pop 0.4s ease;
}

.tick {
    font-size: 45px;
    color: #00ffae;
    margin-bottom: 10px;
}

@keyframes pop {
    from {
        transform: scale(0.7);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="back-btn" onclick="goBack()">← Back</div>

<h2>Create Account 🚀</h2>

<div class="input-box">
    <input type="text" id="username" placeholder="Username">
    <div id="userError" class="error"></div>
</div>

<div class="input-box">
    <input type="email" id="email" placeholder="Email">
    <div id="emailError" class="error"></div>
</div>

<div class="input-box">
    <input type="password" id="password" placeholder="Password">
    <div id="passError" class="error"></div>
</div>

<button onclick="registerUser()">Create Account</button>

</div>

<!-- Popup -->
<div id="successPopup" class="popup">
    <div class="popup-box">
        <div class="tick">✔</div>
        <h3>Account Created!</h3>
        <p>Redirecting to login...</p>
    </div>
</div>

<script>

function goBack() {
    window.location.href = "/";
}

function validateInputs(username, email, password) {
    let valid = true;

    document.getElementById("userError").innerText = "";
    document.getElementById("emailError").innerText = "";
    document.getElementById("passError").innerText = "";

    if (username.length < 3) {
        document.getElementById("userError").innerText = "Username must be at least 3 characters";
        valid = false;
    }

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (!email.match(emailPattern)) {
        document.getElementById("emailError").innerText = "Enter valid email";
        valid = false;
    }

    if (password.length < 6) {
        document.getElementById("passError").innerText = "Password must be at least 6 characters";
        valid = false;
    }

    return valid;
}

async function registerUser() {

    let username = document.getElementById("username").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();

    if (!validateInputs(username, email, password)) return;

    try {
        let res = await fetch("/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username, email, password})
        });

        let data = await res.json();

        if (data.status === "success") {

            document.getElementById("successPopup").classList.add("show");

            setTimeout(() => {
                window.location.href = "/";
            }, 2500);

        } else if (data.status === "user_exists") {
            alert("User already exists ⚠️");
        } else {
            alert("Error ❌");
        }

    } catch {
        alert("Server error 😢");
    }
}
</script>

</body>
</html>
